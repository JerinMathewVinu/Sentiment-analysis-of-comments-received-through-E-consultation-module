<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustLens - Results</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --neon-blue:#00f3ff; --neon-purple:#bc13fe; }
    body { background-color:#050505 !important; color:#e0e0e0; }
    h1,h2,h3,.tagline,.logo { font-family:'Orbitron',sans-serif !important; text-transform:uppercase; letter-spacing:2px; }
    .logo { text-shadow:0 0 5px var(--neon-blue),0 0 15px var(--neon-blue); color:#fff; }
    .navbar { border-bottom:1px solid rgba(0,243,255,0.2); background:rgba(0,0,0,0.8)!important; backdrop-filter:blur(10px); }
    .nav-links a:hover,.nav-links a.active { color:var(--neon-blue)!important; text-shadow:0 0 8px var(--neon-blue); }
    .hero-card {
      background:rgba(10,15,20,0.7)!important; border:1px solid var(--neon-blue)!important;
      box-shadow:0 0 15px rgba(0,243,255,0.2), inset 0 0 20px rgba(0,243,255,0.1)!important;
      backdrop-filter:blur(12px); position:relative; overflow:hidden; border-radius:12px;
    }
    .hero-card::before {
      content:''; position:absolute; top:0; left:-100%; width:100%; height:2px;
      background:linear-gradient(90deg,transparent,var(--neon-blue)); animation:scanline 2.5s linear infinite;
    }
    @keyframes scanline {
      0%{left:-100%;top:0;} 50%{left:100%;top:0;} 50.1%{left:100%;top:100%;} 100%{left:-100%;top:100%;}
    }
    .cyber-grid {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      background-image:linear-gradient(rgba(0,243,255,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(0,243,255,0.07) 1px, transparent 1px);
      background-size:40px 40px; z-index:-1; pointer-events:none;
    }
    .page-section { background:none; }
    .page-section h2 { text-shadow:0 0 10px var(--neon-blue); }
    .result-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:25px; margin-top:20px; }
    .result-item { background:rgba(0,0,0,0.3); padding:20px; border-radius:8px; border-left:3px solid var(--neon-purple); }
    .result-item h3 { color:var(--neon-purple); font-size:1rem; margin-bottom:10px; }
    .result-item p { font-size:1.8rem; font-family:'Orbitron',sans-serif; color:var(--neon-blue); text-shadow:0 0 8px var(--neon-blue); }
  </style>
</head>
<body onload="checkUserAccess(); loadResultPage();">
  <div class="cyber-grid"></div>
  <div class="bg-animation">
    <span></span><span></span><span></span><span></span>
  </div>

<header>
  <nav class="navbar">
    <h1 class="logo">TrustLens</h1>
<ul class="nav-links">
  <li><a href="dashboard.html">Dashboard</a></li>
  <li><a href="analyze.html">Analyze</a></li>
  <li><a href="result.html" class="active">Results</a></li>
  <li><a href="login.html" onclick="logoutUser()">Logout</a></li>
</ul>
  </nav>
</header>

<section class="page-section fade-in">
  <h2>[ ANALYSIS REPORT ]</h2>
  <div class="hero-card" style="max-width: 900px; margin: 30px auto; text-align: left; padding: 40px;">
    <p style="font-family: monospace; color: #aaa; border-bottom: 1px solid rgba(0,243,255,0.2); padding-bottom: 15px; margin-bottom: 20px;">
      <strong>> DATA_STREAM_INPUT:</strong> <span id="reviewDisplay">No review entered.</span>
    </p>

    <div class="result-grid">
      <div class="result-item">
        <h3>SENTIMENT_ANALYSIS</h3>
        <p id="sentiment">Neutral</p>
      </div>
      <div class="result-item">
        <h3>SUSPICION_INDEX</h3>
        <p id="misleading">40%</p>
      </div>
      <div class="result-item">
        <h3>SYSTEM_TRUST_SCORE</h3>
        <p id="trust">60%</p>
      </div>
    </div>

    <div style="margin-top: 25px;">
      <h3 style="color: var(--neon-blue);">> SYSTEM_EXPLANATION:</h3>
      <p id="explanation" style="font-family: monospace; color: #ccc; margin-top: 10px; font-size: 1rem;">No explanation available.</p>
    </div>
  </div>
</section>

<footer><p>© 2026 TrustLens | Java Project</p></footer>
<script src="js/script.js"></script>
</body>
</html>
