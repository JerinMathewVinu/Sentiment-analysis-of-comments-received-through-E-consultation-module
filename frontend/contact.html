<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustLens - Contact</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --neon-blue:#00f3ff; --neon-purple:#bc13fe; }
    body { background-color:#050505 !important; color:#e0e0e0; }
    h1,h2,h3,.tagline,.logo { font-family:'Orbitron',sans-serif !important; text-transform:uppercase; letter-spacing:2px; }
    .logo { text-shadow:0 0 5px var(--neon-blue),0 0 15px var(--neon-blue); color:#fff; }
    .navbar { border-bottom:1px solid rgba(0,243,255,0.2); background:rgba(0,0,0,0.8)!important; backdrop-filter:blur(10px); }
    .nav-links a:hover,.nav-links a.active { color:var(--neon-blue)!important; text-shadow:0 0 8px var(--neon-blue); }
    .hero-card {
      background:rgba(10,15,20,0.7)!important; border:1px solid var(--neon-blue)!important;
      box-shadow:0 0 15px rgba(0,243,255,0.2), inset 0 0 20px rgba(0,243,255,0.1)!important;
      backdrop-filter:blur(12px); position:relative; overflow:hidden; border-radius:12px;
    }
    .hero-card::before {
      content:''; position:absolute; top:0; left:-100%; width:100%; height:2px;
      background:linear-gradient(90deg,transparent,var(--neon-blue)); animation:scanline 2.5s linear infinite;
    }
    @keyframes scanline {
      0%{left:-100%;top:0;} 50%{left:100%;top:0;} 50.1%{left:100%;top:100%;} 100%{left:-100%;top:100%;}
    }
    .btn {
      background:rgba(0,243,255,0.1)!important; border:1px solid var(--neon-blue)!important; color:var(--neon-blue)!important;
      box-shadow:0 0 10px rgba(0,243,255,0.2); font-family:'Orbitron',sans-serif; text-transform:uppercase; transition:all .3s ease;
    }
    .btn:hover { background:var(--neon-blue)!important; color:#000!important; box-shadow:0 0 20px var(--neon-blue),0 0 40px var(--neon-blue); }
    .cyber-grid {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      background-image:linear-gradient(rgba(0,243,255,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(0,243,255,0.07) 1px, transparent 1px);
      background-size:40px 40px; z-index:-1; pointer-events:none;
    }
    .cyber-input {
      width:100%; padding:15px; margin-top:15px; border:1px solid rgba(0,243,255,0.3);
      border-radius:8px; outline:none; background:rgba(0,0,0,0.5); color:#00f3ff; font-family:monospace;
      transition:border .3s, box-shadow .3s;
    }
    .cyber-input::placeholder { color:rgba(0,243,255,0.5); }
    .cyber-input:focus { border-color:var(--neon-blue); box-shadow:0 0 10px rgba(0,243,255,0.3); }
  </style>
</head>
<body>
  <div class="cyber-grid"></div>

  <div class="bg-animation">
    <span></span><span></span><span></span><span></span>
  </div>

  <header>
    <nav class="navbar">
      <h1 class="logo">TrustLens</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
  </header>

  <section class="features fade-in">
    <h2>Contact Us</h2>
    <p class="section-subtitle">Reach out to the TrustLens team for feedback, suggestions, or project-related queries.</p>

    <div class="hero-card" style="max-width: 800px; margin: auto;">
      <h3><span style="color:var(--neon-blue);">[ SECURE TRANSMISSION ]</span></h3>
      <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
        <input type="text" placeholder="> IDENTIFIER (Name)" class="cyber-input" required>
        <input type="email" placeholder="> COMM_LINK (Email)" class="cyber-input" required>
        <textarea rows="6" placeholder="> ENTER_PAYLOAD (Message)..." class="cyber-input" required></textarea>
        <br><br>
        <button type="submit" class="btn">TRANSMIT</button>
      </form>
    </div>
  </section>

  <footer><p>© 2026 TrustLens | Java Project</p></footer>
  <script src="js/script.js"></script>
</body>
</html>
